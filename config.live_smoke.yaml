mode: LIVE
runtime:
  ui_refresh_seconds: 15
  discovery_interval_minutes: 45
  polling_interval_seconds: 20
  summary_interval_minutes: 60
  wallet_evaluation_window_days: 30
  max_runtime_cycles: 0
bankroll:
  paper_starting_bankroll: 200.0
  live_bankroll_reference: 200.0
risk:
  max_total_exposure_pct: 0.15
  max_market_exposure_pct: 0.04
  max_wallet_exposure_pct: 0.06
  copy_fraction_min: 0.03
  copy_fraction_max: 0.05
  max_single_live_trade_usd: 5.0
  daily_stop_loss_pct: 0.05
  max_new_entries_per_hour: 8
  stale_signal_seconds: 3600  # Increased from 180: allows copy-trading trades made hours ago for multi-day markets (EXPIRED_MARKET filter protects against closed markets)
  stale_market_data_seconds: 15
  max_spread_pct: 0.04
  max_entry_drift_pct: 0.05
  max_slippage_pct: 0.03
  min_orderbook_depth_usd: 25.0
  max_hedge_suspicion_score: 0.72
  require_cluster_confirmation_live: true  # Require ≥2 wallets to agree before live entry
  heartbeat_timeout_seconds: 30
  order_timeout_seconds: 60
  max_reprice_attempts: 2
  allow_categories:
    - politics
    - regulatory / legal
    - entertainment / pop culture
    - macro / economics
    - geopolitics
    - crypto price
cluster:
  enabled: true
  confirmation_window_seconds: 180
  min_wallets: 2
  strong_cluster_wallets: 3
  mode: HYBRID
entry_styles:
  compare:
    - FOLLOW_TAKER
    - PASSIVE_LIMIT
    - POST_ONLY_MAKER
  preferred_live_entry_style: PASSIVE_LIMIT
backtest:
  delay_buckets_seconds:
    - 5
    - 15
    - 30
    - 60
  min_wallet_replay_expectancy: 0.001
  min_wallet_copyability_score: 0.20
wallet_selection:
  top_research_wallets: 20
  approved_paper_wallets: 10
  approved_live_wallets: 10
  min_trade_count: 12
  min_copyability_score: 0.20
  min_delay_viability_score: 0.15
categories:
  tracked:
    - politics
    - regulatory / legal
    - crypto price
    - sports
    - entertainment / pop culture
    - macro / economics
    - geopolitics
alerts:
  enable_console_alerts: true
  health_pause_on_live_mismatch: true
live:
  enabled: true
  require_paper_validation: true
  only_cluster_confirmed: false
  only_low_hedge_suspicion: true
  manual_live_enable: true
  manual_resume_required: false
  global_kill_switch: false
  emergency_flatten_flag: false
  heartbeat_required: true
  bounded_execution_seconds: 20
  enable_multi_entry_style_live: true
  minimum_order_size_shares: 5.0
  minimum_order_notional_usd: 1.0
  hard_skip_price_floor: 0.03
  hard_skip_price_ceiling: 0.95
  preferred_entry_price_min: 0.15
  preferred_entry_price_max: 0.80
  minimum_fillability_score: 0.52
  minimum_signal_quality_score: 0.65  # Raised from 0.50 — only high-quality signals live
  passive_signal_ttl_seconds: 900
  adaptive_profit_arm_pct: 0.07
  adaptive_profit_min_lock_pct: 0.03
  trailing_profit_retrace_pct: 0.30
  strong_winner_profit_pct: 0.30
  strong_winner_retrace_pct: 0.18
  paired_arb_time_stop_hours: 168
  selected_categories:
    - politics
    - regulatory / legal
    - macro / economics
    - geopolitics
    - crypto price
    - sports
    # entertainment / pop culture removed: Oscar signals caused losses
strategies:
  enable_event_driven_official: true
  enable_correlation_dislocation: true
  enable_resolution_window: true
  enable_paired_binary_arb: true
  strategy_market_page_size: 250
  strategy_market_max_pages_live: 4
  strategy_market_max_pages_research: 2
  official_signal_file: data/official_event_signals.json
  official_signal_max_age_minutes: 240
  official_signal_min_edge_pct: 0.06
  official_signal_min_source_reliability: 0.65
  official_signal_min_confidence: 0.65
  official_signal_live_enabled: false  # Disabled: Oscars signals were wrong, no fresh signals loaded
  correlation_min_gap_pct: 0.03
  correlation_min_group_size: 2
  correlation_max_groups: 16
  correlation_near_miss_gap_ratio: 0.80
  correlation_live_enabled: false
  supplemental_paper_relaxed_enabled: true
  supplemental_paper_relaxed_min_confidence: 0.72
  paired_binary_min_edge_pct: 0.03
  paired_binary_min_net_edge_pct: 0.012
  paired_binary_min_leg_price: 0.08
  paired_binary_max_leg_price: 0.92
  paired_binary_slippage_buffer_pct: 0.003
  paired_binary_max_candidates_per_cycle: 2
  paired_binary_max_best_level_fraction: 0.15
  paired_binary_live_enabled: true
  resolution_window_max_hours: 168
  resolution_window_min_price: 0.65
  resolution_window_min_edge_pct: 0.03
  resolution_window_near_miss_edge_ratio: 0.50
  resolution_window_near_miss_price_buffer: 0.05
  resolution_window_target_fair_price: 0.94
  resolution_window_min_liquidity: 100.0
  resolution_window_live_enabled: false  # Disabled until wallet signals are validated
endpoints:
  gamma_base_url: https://gamma-api.polymarket.com
  clob_base_url: https://clob.polymarket.com
  data_base_url: https://data-api.polymarket.com
  user_agent: polymarket-wallet-follow-bot/0.2
rtds:
  enabled: true
  url: wss://data-stream.binance.vision/ws/btcusdt@aggTrade
  ping_interval_seconds: 5.0
  staleness_max_seconds: 1.5
  clob_staleness_max_seconds: 0.8
fees:
  min_edge_after_fees_taker: 0.020
  min_edge_after_fees_maker: 0.010
  enable_global_fee_gate: true
lag_signal:
  enabled: true
  live_enabled: false
  min_price_divergence_pct: 0.003
  min_spot_move_pct: 0.003
  min_lag_ms: 50.0
  min_net_edge_taker: 0.020
  min_net_edge_maker: 0.010
  min_time_remaining_seconds: 30.0
  max_candidates_per_cycle: 2
completion_tracker:
  enabled: true
  entry_threshold: 0.70
  abort_threshold: 0.40
  deadline_fraction: 0.60
  tick_interval_seconds: 5.0
