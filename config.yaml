  hard_skip_price_ceiling: 0.65    # was 0.95 - CRITICAL: blocks 0.72/0.88/0.90 entries that caused -$16 losses
  preferred_entry_price_min: 0.30  # was 0.20 - align with hard floor
  preferred_entry_price_max: 0.58  # was 0.80 - sweet spot 0.30-0.58 where risk/reward is fair
  minimum_fillability_score: 0.48  # was 0.40 - higher quality bar
  minimum_signal_quality_score: 0.48  # was 0.40 - higher quality bar
  passive_signal_ttl_seconds: 600
  adaptive_profit_arm_pct: 0.08
  adaptive_profit_min_lock_pct: 0.03
  trailing_profit_retrace_pct: 0.35
  strong_winner_profit_pct: 0.35
  strong_winner_retrace_pct: 0.20
  paired_arb_time_stop_hours: 168
  # Binary market exits — wide thresholds prevent premature shakeouts.
  # Data: EXIT_FILLED (48h stop+10% SL) = -$46.94 at 11% win rate.
  # Natural resolution (EXCHANGE_POSITION_MISSING) = +$17.74 at 29% win rate.
  binary_stop_loss_pct: 0.45    # only exit when market genuinely collapses
  binary_time_stop_hours: 168   # 7-day window; most markets resolve within this
