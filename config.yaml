# ---------------------------------------------------------------------------
# Bracket strategy — direction signal observer
#
# Run with:  python main.py --observe-crypto
#
# Phase 1: buy momentum_side (YES if BTC going up, NO if going down) at ~58c.
# Phase 2: watch opposite_side fall to ~34c, wait for confirmed reversal, then
#           lock the bracket (x + y + fees < $1.00 = guaranteed profit at close).
#
# The observer is READ-ONLY — it logs signals and post-window outcomes to JSONL
# for calibration. Set enabled: true to activate.
# ---------------------------------------------------------------------------
crypto_direction:
  enabled: true                       # Set to false to disable

  # BTC configuration
  btc:
    binance_ws_url: "wss://stream.binance.com/ws/btcusdt@aggTrade"
    slug_prefix: "btc-updown-5m"       # 5-min mode. Change to "btc-updown-15m" for 15-min.
    annual_vol_pct: 0.69              # ~69% annualised vol; used by the GBM lag model
    min_asset_move_pct: 0.0002        # was 0.0004 — BTC moves ~half as much in 5 min vs 15 min

  # ETH configuration
  eth:
    binance_ws_url: "wss://stream.binance.com/ws/ethusdt@aggTrade"
    slug_prefix: "eth-updown-15m"      # Confirmed from data/strategy_signal_log.jsonl
    annual_vol_pct: 1.03              # ~103% annualised vol (ETH is more volatile than BTC)
    min_asset_move_pct: 0.0006        # ETH must have moved >= 0.06% from window open
                                      # (proportional to BTC adjustment; ETH is more volatile)

  # Asset selection
  track_btc: true
  track_eth: false                    # ETH paused — BTC-only mode for cleaner signal data
  prefer_higher_liquidity: false      # Single asset (BTC), no need to compare liquidity

  # Window duration — CHANGE THIS to switch between 5-min and 15-min mode
  # Also update btc.slug_prefix above to match.
  window_duration_seconds: 300        # 300 = 5-min mode, 900 = 15-min mode

  # Signal gate parameters (calibrated for 5-min windows)
  window_settle_seconds: 15           # was 45 — 5% of 300s; AMM settles fast in 5-min markets
  time_gate_minutes: 1.0              # was 2.0 — for 5-min windows, 1 min is enough for FOK fill
  entry_range_low: 0.57               # raised from 0.53 — at 0.53 opp.side starts at ~0.48 (2c from break-even);
                                      # any BTC reversal kills the bracket. At 0.57+ opp.side ~0.43 (9c buffer to 0.34 target).
  entry_range_high: 0.63              # tightened from 0.65 — above 0.63 bracket margin at target_y becomes very thin
  chop_window: 3                      # was 4 — 5-min window yields max 3 minute-mark checkpoints before time gate
  chop_max_reversal_pct: 0.001        # unchanged — same BTC noise band
  chop_min_score: 0.51                # was 0.25 — blocks soft passes (0.50) which fired before enough checkpoints existed
  lag_threshold: 0.015                # raised from 0.005 — weak-lag signals (0.014) were losing; winners had 0.115+

  # Bracket parameters
  target_y_price: 0.34                # Target entry for the second leg (opposite side)
  phase2_reversal_threshold: 0.01     # Opposite side must bounce >= 1c from its floor

  # Timing
  poll_interval_seconds: 1.0          # How often the observer main loop runs (was 2.0)
  price_refresh_interval_seconds: 1.0 # How often Polymarket YES/NO prices are fetched (was 2.0)
  price_staleness_max_seconds: 10.0   # Reject evaluate() if prices haven't refreshed

  # Log paths
  signal_event_log_path: "logs/crypto_signal_events.jsonl"
  evaluation_log_path: "logs/crypto_signal_evaluations.jsonl"
  window_report_path: "logs/window_report.md"  # Human-readable per-window report
  hypothetical_bet_size: 10.0                  # $ per signal for PnL simulation

  # ---------------------------------------------------------------------------
  # Live execution (bracket_executor.py)
  # SAFETY: set execute_enabled: true ONLY when ready to trade real money.
  # Also requires LIVE_TRADING_ENABLED=true in .env and valid wallet credentials.
  #
  # To go live:
  #   1. Set execute_enabled: true below
  #   2. Run: python main.py --execute-crypto
  #
  # Both phases run together. Phase 1 fires on signal; Phase 2 fires automatically
  # when the bracket equation locks guaranteed profit. Both use FOLLOW_TAKER (FOK)
  # for immediate fills. All trades logged to logs/bracket_trades.jsonl.
  # ---------------------------------------------------------------------------
  execute_enabled: false              # flip to true when ready to trade
  phase2_enabled: true                # both phases active — set false to test P1 only
  max_concurrent_brackets: 1         # max open bracket positions across all assets
  phase1_bet_size_usd: 5.0           # USD notional per Phase 1 leg ($5 to start)
  min_bracket_shares: 1.0            # minimum shares per order
  phase1_entry_style: FOLLOW_TAKER   # FOK — immediate fill, captures Binance lag
  phase2_entry_style: FOLLOW_TAKER   # FOK — locks bracket the moment margin turns positive
  bracket_audit_log_path: "logs/bracket_trades.jsonl"
  # Hard exit: sell Phase-1 position to cut losses mid-window
  # Triggers if (a) momentum-side mark drops to stop_price, OR
  # (b) we're in the final hard_exit_final_seconds AND still losing.
  hard_exit_stop_price: 0.50         # sell if mark drops to 50c (bought above this)
  hard_exit_final_seconds: 30        # also sell in last 30s if mark < entry price
